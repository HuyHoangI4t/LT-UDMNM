services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: admission_chatbot
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: admission_chatbot
      DB_USERNAME: root
      DB_PASSWORD: root
      CACHE_STORE: file
      SESSION_DRIVER: database
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_URL: http://localhost:8000/api
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  mysql_data:
